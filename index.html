<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b0000">
<link rel="apple-touch-icon" href="icon.png">

<title>MTheater🎥</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">

<style>
.watchShelf{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
}

.watchCard{
min-width:140px;
background:#fdf6e3;
color:#222;
padding:10px;
border-radius:10px;
text-align:center;
}

body{
font-family:'Zen Maru Gothic', sans-serif;
background:linear-gradient(180deg,#4a4a4a,#5c5c5c);
color:#f8f8f8;
padding:20px;
position:relative;
}

/* カーテン */ body::before{ content:""; position:fixed; top:0; left:0; width:100%; height:180px; background: repeating-linear-gradient( 90deg, #8b0000 0px, #8b0000 40px, #a00000 40px, #a00000 80px ); opacity:0.85; z-index:-1; }

h1{
text-align:center;
font-size:38px;
color:#ffd700;
margin-bottom:30px;
}

.card{
background:#fdf6e3;
color:#222;
padding:20px;
border-radius:12px;
margin-bottom:15px;
border:2px dashed #d4af37;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
cursor:pointer;
}

.watching-card{
background:#fff5f5;
border:2px solid #d9534f;
}

.now-label{
background:#d9534f;
color:white;
padding:3px 10px;
font-size:12px;
border-radius:20px;
display:inline-block;
margin-bottom:5px;
}

input,select,textarea{
width:98%;
margin-bottom:10px;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:6px;
width:100%;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.deleteBtn{
background:#999;
color:white;
}

.stars{
font-size:28px;
margin-bottom:10px;
}

.star{
cursor:pointer;
color:#ccc;
}

.star.active{
color:#d4af37;
}

.progress{
font-size:14px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.popup{
background:#fdf6e3;
color:#222;
padding:25px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.popup img{
width:150px;
border-radius:10px;
margin-bottom:10px;
}

.title{ font-size:20px; 
 font-weight:bold; 
 display:block; 
 margin-bottom:5px; 
 line-height:1.3;
}

#search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
font-size:16px;
}

.shelf{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
margin-bottom:30px;
}

#suggestions{
background:white;
color:black;
border-radius:6px;
overflow:hidden;
margin-bottom:10px;
}

.suggestItem{
padding:8px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestItem:hover{
background:#eee;
}

.watchCard{
min-width:140px;
background:#fff5f5;
color:#222;
padding:10px;
border-radius:10px;
text-align:center;
border:4px solid #d9534f;
position:relative;
}

.watchLabel{
background:#d9534f;
color:white;
font-size:11px;
padding:3px 8px;
border-radius:20px;
display:inline-block;
margin-bottom:5px;
}

#list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

textarea{
min-height:80px;
resize:vertical;
}

.settings{
position:fixed;
top:15px;
right:15px;
z-index:2000;
}

.settings button{
width:45px;
height:45px;
border-radius:50%;
background:#d4af37;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.4);
}

.settingsMenu{
display:none;
flex-direction:column;
background:#fdf6e3;
padding:10px;
border-radius:10px;
margin-top:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.settingsMenu button{
width:150px;
height:auto;
border-radius:6px;
margin:3px 0;
font-size:14px;
}

.card{
width:100%;
box-sizing:border-box;
}

#list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}


</style>
</head>

<body>


<div class="settings">

<button onclick="toggleMenu()">⚙️</button>

<div id="settingsMenu" class="settingsMenu">

<button onclick="backup()">📦 バックアップ</button>

<button onclick="document.getElementById('restoreFile').click()">♻️ 復元</button>

<button onclick="clearAll()">🗑 データ削除</button>

</div>

</div>

<input type="file" id="restoreFile" style="display:none" onchange="restore(event)">

<h1>🎥 MTheater 🍿</h1>
<input id="search" placeholder="🔍 作品を検索..." oninput="render()">

<div class="card" style="cursor:default">

<input id="title" placeholder="タイトル">
<div id="suggestions"></div>

<select id="type">
<option>ドラマ</option>
<option>アニメ</option>
<option>映画</option>
<option>映画(映画館)</option>

</select>

<label>全話数</label>
<input id="total" type="number">

<label>何話までみた？</label>
<input id="current" type="number">

<label>
現在視聴中 👀
<input type="checkbox" id="watching">
</label>

<div class="stars">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>

<label>日付</label>
<input id="date" type="date">

<textarea id="memo" placeholder="感想"></textarea>

<button onclick="save()">保存する</button>

</div>

<h2 style="color:#ffd700;">🎬 とちゅう</h2>
<div class="watchShelf" id="nowShowing"></div>

<h2>📖 りれき</h2>
<div id="historyShelves"></div>


<script>

const GENRES = {
28:"アクション",
12:"アドベンチャー",
16:"アニメ",
35:"コメディ",
80:"犯罪",
99:"ドキュメンタリー",
18:"ドラマ",
10751:"ファミリー",
14:"ファンタジー",
36:"歴史",
27:"ホラー",
10402:"音楽",
9648:"ミステリー",
10749:"ロマンス",
878:"SF",
10770:"TV映画",
53:"スリラー",
10752:"戦争",
37:"西部劇"
};

const API_KEY="c3bea3c3953ede7391c52a1b66bc6f5e";


let logs=JSON.parse(localStorage.getItem("logs"))||[];
let currentRating=0;
let editIndex=null;


/* ★ */

function setRating(r){

currentRating=r;

document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<r);
})

}

/* TMDB検索 */

async function searchMovie(title){

try{

const url=`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(title)}&language=ja-JP`;

const res=await fetch(url);
const data=await res.json();

if(!data.results.length) return {poster:"",genre:""};

const item=data.results[0];

return{
poster:item.poster_path?`https://image.tmdb.org/t/p/w500${item.poster_path}`:"",
genre:(item.genre_ids||[])
.map(id=>GENRES[id])
.filter(Boolean)
.join(" / ")
}

}catch{

return {poster:"",genre:""};

}

}

/* 保存 */

async function save(){

if(!title.value) return alert("タイトル入力してね");

const movie=await searchMovie(title.value);

const log={

title:title.value,
type:type.value,
total:Number(total.value)||0,
current:Number(current.value)||0,
rating:Number(currentRating),
date:date.value,
memo:memo.value,
watching:watching.checked,
poster:movie.poster,
genre:movie.genre

};

if(editIndex!==null){

logs[editIndex]=log;
editIndex=null;

}else{

logs.push(log);

}

localStorage.setItem("logs",JSON.stringify(logs));

clearForm();
render();

}

/* フォーム */

function clearForm(){

title.value="";
total.value="";
current.value="";
date.value="";
memo.value="";
watching.checked=false;

currentRating=0;

document.querySelectorAll(".star").forEach(s=>s.classList.remove("active"));

}

/* 編集 */

function editLog(i){

const log=logs[i];

title.value=log.title;
type.value=log.type;
total.value=log.total;
current.value=log.current;
date.value=log.date;
memo.value=log.memo;
watching.checked=log.watching;

setRating(log.rating);

editIndex=i;

window.scrollTo({top:0,behavior:"smooth"});

}

/* 削除 */

function deleteLog(i){

if(!confirm("削除する？")) return;

logs.splice(i,1);

localStorage.setItem("logs",JSON.stringify(logs));

render();

}

/* 表示 */

function render(){

const keyword=(search.value||"").toLowerCase();

nowShowing.innerHTML="";
historyShelves.innerHTML="";

/* 視聴中 */

logs
.filter(l=>l.title.toLowerCase().includes(keyword))
.forEach((log,i)=>{

if(log.watching){

nowShowing.innerHTML+=`

<div class="watchCard" onclick="showDetail(${i})">

<div class="watchLabel">NOW WATCHING</div>

${log.poster?`<img src="${log.poster}" style="width:80px;border-radius:6px;">`:""}

<div>${log.title}</div>

${log.watching && log.type==="ドラマ"
? `📺 ${log.current}/${log.total}話`
: `★${log.rating}`}


<br>

<button onclick="event.stopPropagation();nextEpisode(${i})">▶ 次の話</button>

<button onclick="event.stopPropagation();finish(${i})">✔ 見終わった</button>

<button onclick="event.stopPropagation();editLog(${i})">編集</button>

<button class="deleteBtn" onclick="event.stopPropagation();deleteLog(${i})">削除</button>

</div>
`;

}

});

/* 履歴 */

const history = logs.filter(l=>!l.watching && l.title.toLowerCase().includes(keyword));

for(let i=0;i<history.length;i+=10){

let shelfHTML='<div class="shelf">';

history.slice(i,i+10).forEach((log)=>{

const realIndex = logs.indexOf(log);

const progress=log.total
?Math.floor(log.current/log.total*100)
:0;

shelfHTML+=`

<div class="card" onclick="showDetail(${realIndex})">

${log.poster?`<img src="${log.poster}" style="width:90px;border-radius:8px;margin-bottom:5px;">`:""}

<strong class="title">${log.title}</strong>

${log.genre?`<div>🎭 ${log.genre}</div>`:""}

${log.type==="ドラマ" || log.type==="アニメ"
?`<div class="progress">進捗 ${log.current}/${log.total}話 (${progress}%)</div>`
:""}

★${log.rating}

<br>

${log.date
? (log.type==="映画(映画館)"
    ? `🍿 鑑賞日 ${log.date}`
    : `📅 ${log.date}`)
: ""}

<br>

<button onclick="event.stopPropagation();editLog(${realIndex})">編集</button>

<button class="deleteBtn" onclick="event.stopPropagation();deleteLog(${realIndex})">削除</button>

</div>
`;

});

shelfHTML+="</div>";

historyShelves.innerHTML+=shelfHTML;

}

}

function toggleMenu(){

const menu=document.getElementById("settingsMenu");

menu.style.display =
menu.style.display==="flex" ? "none" : "flex";

}

function clearAll(){

if(confirm("全部のデータ削除する？")){

logs=[];

localStorage.removeItem("logs");

render();

}

}

/* 詳細 */

function showDetail(i){

const log=logs[i];

popupContent.innerHTML=`

${log.poster?`<img src="${log.poster}">`:""}

<h3>${log.title}</h3>

<p>${log.type}</p>

<p>評価 ${"★".repeat(Number(log.rating) || 0)}</p>

<p>📅 ${log.date||"-"}</p>

<p>${(log.memo || "感想なし").replace(/\n/g,"<br>")}</p>

`;

overlay.style.display="flex";

}

function closeDetail(){

overlay.style.display="none";

}

/* タイトル候補 */

title.addEventListener("input",async()=>{

const q=title.value;

if(q.length<2){

suggestions.innerHTML="";
return;

}

try{

const url=`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=ja-JP`;

const res=await fetch(url);
const data=await res.json();

suggestions.innerHTML="";

data.results.slice(0,5).forEach(item=>{

const name=item.title||item.name;

const div=document.createElement("div");

div.className="suggestItem";
div.innerText=name;

div.onclick=()=>{

title.value=name;
suggestions.innerHTML="";

};

suggestions.appendChild(div);

});

}catch{}

});

render();

function nextEpisode(i){

logs[i].current++;

if(logs[i].total && logs[i].current > logs[i].total){
logs[i].current = logs[i].total;
}

logs[i].progress = logs[i].total
? Math.round((logs[i].current / logs[i].total) * 100)
: 100;

localStorage.setItem("logs",JSON.stringify(logs));

render();

}

function finish(i){

logs[i].watching = false;

if(logs[i].total){
logs[i].current = logs[i].total;
logs[i].progress = 100;
}

localStorage.setItem("logs",JSON.stringify(logs));

render();

}

/* バックアップ */

function backup(){

const data = JSON.stringify(logs,null,2);

const blob = new Blob([data],{type:"application/json"});

const url = URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="movie_backup.json";

a.click();

URL.revokeObjectURL(url);

}

/* 復元 */

function restore(event){

const file=event.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

try{

logs=JSON.parse(e.target.result);

localStorage.setItem("logs",JSON.stringify(logs));

render();

alert("復元しました！");

}catch{

alert("バックアップファイルが読み込めません");

}

};

reader.readAsText(file);

}



</script>
<div id="overlay" class="overlay" onclick="closeDetail()">
  <div class="popup" onclick="event.stopPropagation()">
    <div id="popupContent"></div>
    <button onclick="closeDetail()">閉じる</button>
  </div>
</div>
</body>
</html>
